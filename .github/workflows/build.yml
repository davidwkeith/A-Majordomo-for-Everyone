name: Build ePub

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build:check

      - run: npm test

      - run: npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: epub
          path: dist/a-majordomo-for-everyone.epub
